<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hiccup Renderer Test</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
      }
      .hiccup-renderer {
        max-width: 800px;
        margin: 0 auto;
      }
      .hiccup-input-section {
        margin-bottom: 20px;
      }
      .hiccup-textarea {
        width: 100%;
        height: 150px;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-family: monospace;
      }
      .hiccup-output-section {
        margin-bottom: 20px;
      }
      .hiccup-result {
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        min-height: 100px;
      }
      .hiccup-examples {
        margin-top: 20px;
      }
      .example-buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 10px;
      }
      .example-buttons button {
        padding: 5px 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        background: #f0f0f0;
        cursor: pointer;
      }
      .example-buttons button:hover {
        background: #e0e0e0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./hiccupTest.tsx"></script>
  </body>
</html>
