name: Build and Release plugin

env:
  PLUGIN_NAME: logseq-text-toolkit

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          registry-url: https://registry.npmjs.org/

      - name: Get version from package.json
        id: get_version
        run: |
          if command -v jq &> /dev/null; then
            VERSION=$(jq -r '.version' package.json)
          else
            VERSION=$(cat package.json | grep version | head -1 | awk -F: '{ print $2 }' | sed 's/[",]//g' | tr -d ' ')
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Tagging version $VERSION"

      - name: Extract release notes from CHANGELOG.md
        id: extract_notes
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          echo "Extracting release notes for v$VERSION"
          
          RELEASE_NOTES=$(awk -v ver="## v$VERSION" '
            BEGIN { in_section=0; first_line=1 }
            /^## v/ { 
              if (in_section) exit 
              if ($0 == ver) in_section=1 
              next 
            }
            in_section { 
              if (first_line) { first_line=0; next }
              print 
            }
          ' CHANGELOG.md)
          
          if [ -z "$RELEASE_NOTES" ]; then
            RELEASE_NOTES="## What's New\n\n- Release v$VERSION\n- For detailed changes, please see the CHANGELOG.md file."
          fi
          
          echo "$RELEASE_NOTES" > release_notes.md
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$RELEASE_NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          echo "Release notes extracted successfully:"
          echo "$RELEASE_NOTES"

      - name: Delete existing tag if exists
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -d v${{ steps.get_version.outputs.VERSION }} 2>/dev/null || true
          git push origin :v${{ steps.get_version.outputs.VERSION }} 2>/dev/null || true
          echo "Deleted existing tag v${{ steps.get_version.outputs.VERSION }} if it existed"

      - name: Create and push tag
        run: |
          git tag -a v${{ steps.get_version.outputs.VERSION }} -m "Release v${{ steps.get_version.outputs.VERSION }}"
          git push origin v${{ steps.get_version.outputs.VERSION }}
          echo "Created and pushed tag v${{ steps.get_version.outputs.VERSION }}"

      - name: Build
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
          YARN_REGISTRY: https://registry.npmjs.org/
        run: |
          echo "Installing dependencies..."
          npm install --no-lockfile --legacy-peer-deps
          
          echo "Building plugin..."
          npm run build:plugin
          
          echo "Preparing release package..."
          mkdir -p ${{ env.PLUGIN_NAME }}
          cp README.md package.json icon.png ${{ env.PLUGIN_NAME }}
          mv dist ${{ env.PLUGIN_NAME }}
          
          echo "Creating zip file..."
          zip -r ${{ env.PLUGIN_NAME }}.zip ${{ env.PLUGIN_NAME }}
          
          echo "Build completed successfully!"
          ls -la ${{ env.PLUGIN_NAME }}.zip

      - name: Delete existing release if exists
        run: |
          RELEASE_ID=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/v${{ steps.get_version.outputs.VERSION }}" \
            | jq -r '.id')
          
          if [ "$RELEASE_ID" != "null" ]; then
            curl -s -X DELETE -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID"
            echo "Deleted existing release v${{ steps.get_version.outputs.VERSION }}"
          else
            echo "No existing release to delete"
          fi

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          release_name: Release v${{ steps.get_version.outputs.VERSION }}
          body: ${{ steps.extract_notes.outputs.RELEASE_NOTES }}
          draft: false
          prerelease: false

      - name: Upload zip file
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./${{ env.PLUGIN_NAME }}.zip
          asset_name: ${{ env.PLUGIN_NAME }}-v${{ steps.get_version.outputs.VERSION }}.zip
          asset_content_type: application/zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}
          path: ./${{ env.PLUGIN_NAME }}.zip
          retention-days: 7
