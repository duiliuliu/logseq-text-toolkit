name: Build and Release plugin

env:
  PLUGIN_NAME: logseq-text-toolkit

# Controls when the workflow will run
on:
  push:
    branches:
      - master

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  build-and-release:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          # 新增：强制指定 npm 镜像源
          registry-url: https://registry.npmjs.org/

      - name: Get version from package.json
        id: get_version
        run: |
          # 使用 jq 更可靠地获取版本号
          if command -v jq &> /dev/null; then
            VERSION=$(jq -r '.version' package.json)
          else
            # 回退到使用 awk/sed 方式
            VERSION=$(cat package.json | grep version | head -1 | awk -F: '{ print $2 }' | sed 's/[",]//g' | tr -d ' ')
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Tagging version $VERSION"

      - name: Check if tag exists
        id: check_tag
        run: |
          if git tag -l v${{ steps.get_version.outputs.VERSION }}; then
            echo "TAG_EXISTS=true" >> $GITHUB_OUTPUT
            echo "Tag v${{ steps.get_version.outputs.VERSION }} already exists"
          else
            echo "TAG_EXISTS=false" >> $GITHUB_OUTPUT
            echo "Tag v${{ steps.get_version.outputs.VERSION }} does not exist, will create it"
          fi

      - name: Create tag
        if: steps.check_tag.outputs.TAG_EXISTS == 'false'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a v${{ steps.get_version.outputs.VERSION }} -m "Release v${{ steps.get_version.outputs.VERSION }}"
          git push origin v${{ steps.get_version.outputs.VERSION }}
          echo "Created and pushed tag v${{ steps.get_version.outputs.VERSION }}"

      - name: Build
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
          YARN_REGISTRY: https://registry.npmjs.org/
        run: |
          echo "Installing dependencies..."
          # 使用 npm 代替 yarn 以避免镜像源问题
          npm install --no-lockfile --legacy-peer-deps
          
          echo "Building plugin..."
          npm run build:plugin
          
          echo "Preparing release package..."
          mkdir -p ${{ env.PLUGIN_NAME }}
          cp README.md package.json icon.png ${{ env.PLUGIN_NAME }}
          mv dist ${{ env.PLUGIN_NAME }}
          
          echo "Creating zip file..."
          zip -r ${{ env.PLUGIN_NAME }}.zip ${{ env.PLUGIN_NAME }}
          
          echo "Build completed successfully!"
          ls -la ${{ env.PLUGIN_NAME }}.zip

      - name: Create Release
        id: create_release
        if: steps.check_tag.outputs.TAG_EXISTS == 'false'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          release_name: Release v${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false

      - name: Upload zip file
        if: steps.check_tag.outputs.TAG_EXISTS == 'false'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./${{ env.PLUGIN_NAME }}.zip
          asset_name: ${{ env.PLUGIN_NAME }}-v${{ steps.get_version.outputs.VERSION }}.zip
          asset_content_type: application/zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}
          path: ./${{ env.PLUGIN_NAME }}.zip
          retention-days: 7
