# Branch Release Workflow

name: Branch Release

env:
  PLUGIN_NAME: logseq-text-toolkit

# Controls when the workflow will run
on:
  push:
    branches:
      - dev-text-tool

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  build-and-tag:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v2
        with:
          node-version: "14.x"

      - name: Get current version
        id: get-version
        run: |
          VERSION=$(grep "version" package.json | cut -d '"' -f 4)
          echo "::set-output name=version::$VERSION"

      - name: Build
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
        run: |
          # 使用 npm 代替 yarn 以避免镜像源问题
          npm install
          npm run build
          mkdir ${{ env.PLUGIN_NAME }}
          cp README.md package.json images/icon.png ${{ env.PLUGIN_NAME }}
          mv dist ${{ env.PLUGIN_NAME }}
          zip -r ${{ env.PLUGIN_NAME }}.zip ${{ env.PLUGIN_NAME }}

      - name: Create branch tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.get-version.outputs.version }}
          BRANCH_TAG="branch-${VERSION}"
          
          # Delete existing tag if it exists
          git tag -d $BRANCH_TAG 2>/dev/null || true
          git push origin :$BRANCH_TAG 2>/dev/null || true
          
          # Create new branch tag
          git tag $BRANCH_TAG
          git push origin $BRANCH_TAG
          
          echo "Created branch tag: $BRANCH_TAG"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}
          path: ./${{ env.PLUGIN_NAME }}.zip