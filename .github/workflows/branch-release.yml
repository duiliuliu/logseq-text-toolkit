# Branch Release Workflow

name: Branch Release

env:
  PLUGIN_NAME: logseq-text-toolkit
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Controls when the workflow will run
on:
  push:
    branches:
      - dev-text-tool

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  build-and-tag:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18.x"
          cache: "npm"
          cache-dependency-path: package.json

      - name: Get current version
        id: get-version
        run: |
          # 使用 grep 和 sed 代替 jq 来获取版本号，避免依赖外部工具
          VERSION=$(grep -oP '"version":\s*"\K[^"]+' package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
        run: |
          # 使用 npm 代替 yarn 以避免镜像源问题
          npm install --no-lockfile --legacy-peer-deps
          npm run build:plugin
          mkdir -p ${{ env.PLUGIN_NAME }}
          cp README.md package.json icon.png ${{ env.PLUGIN_NAME }}
          mv dist ${{ env.PLUGIN_NAME }}
          zip -r ${{ env.PLUGIN_NAME }}.zip ${{ env.PLUGIN_NAME }}
          ls -la

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}
          path: ./${{ env.PLUGIN_NAME }}.zip
          retention-days: 7