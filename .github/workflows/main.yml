# This is a basic workflow to help you get started with Actions

name: Release

env:
  PLUGIN_NAME: logseq-plugin-wrap

# Controls when the workflow will run
on:
  push:
    tags:
      - "*" # Push events to matching any tag format, i.e. 1.0, 20.15.10

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v2
        with:
          node-version: "14.x"

      - name: Build
        id: build
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
        run: |
          # 使用 npm 代替 yarn 以避免镜像源问题
          npm install
          npm run build
          mkdir ${{ env.PLUGIN_NAME }}
          cp README.md package.json icon.png ${{ env.PLUGIN_NAME }}
          mv dist ${{ env.PLUGIN_NAME }}
          zip -r ${{ env.PLUGIN_NAME }}.zip ${{ env.PLUGIN_NAME }}
          ls
          echo "::set-output name=tag_name::$(git tag --sort version:refname | tail -n 1)"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}
          path: ./${{ env.PLUGIN_NAME }}.zip

  release:
    needs: build
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    # Only run on tag pushes
    if: startsWith(github.ref, 'refs/tags/')

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v2
        with:
          node-version: "14.x"

      - name: Build
        id: build
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
        run: |
          # 使用 npm 代替 yarn 以避免镜像源问题
          npm install
          npm run build
          mkdir ${{ env.PLUGIN_NAME }}
          cp README.md package.json icon.png ${{ env.PLUGIN_NAME }}
          mv dist ${{ env.PLUGIN_NAME }}
          zip -r ${{ env.PLUGIN_NAME }}.zip ${{ env.PLUGIN_NAME }}
          ls
          echo "::set-output name=tag_name::$(git tag --sort version:refname | tail -n 1)"

      - name: Create or Update Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 设置变量
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          RELEASE_NAME="$TAG_NAME"
          ZIP_FILE="./${{ env.PLUGIN_NAME }}.zip"
          
          # 检查 release 是否存在
          if gh release view "$TAG_NAME" > /dev/null 2>&1; then
            echo "Release $TAG_NAME already exists, updating..."
            # 删除已存在的 asset
            gh release delete-asset "$TAG_NAME" "${{ env.PLUGIN_NAME }}.zip" || true
            # 上传新的 asset
            gh release upload "$TAG_NAME" "$ZIP_FILE"
          else
            echo "Creating new release $TAG_NAME..."
            # 创建新的 release 并上传 asset
            gh release create "$TAG_NAME" "$ZIP_FILE" --title "$RELEASE_NAME"
          fi
